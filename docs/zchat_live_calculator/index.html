<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stylish Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="scene" aria-label="Stylish Calculator">
    <section class="calculator" aria-labelledby="calculator-title">
      <div class="shine" aria-hidden="true"></div>

      <header class="calculator__header">
        <div>
          <p class="eyebrow">Offline · Vanilla JS</p>
          <h1 id="calculator-title">Calculator</h1>
        </div>
        <div class="orb" aria-hidden="true"></div>
      </header>

      <section class="display" aria-live="polite">
        <div id="expression" class="display__expression" aria-label="Expression">0</div>
        <output id="result" class="display__result" aria-label="Result">0</output>
      </section>

      <section class="keys" aria-label="Calculator keys">
        <button class="key key--utility" type="button" data-action="clear">AC</button>
        <button class="key key--utility" type="button" data-action="backspace">⌫</button>
        <button class="key key--utility" type="button" data-action="sign">±</button>
        <button class="key key--operator" type="button" data-value="/">÷</button>

        <button class="key" type="button" data-value="7">7</button>
        <button class="key" type="button" data-value="8">8</button>
        <button class="key" type="button" data-value="9">9</button>
        <button class="key key--operator" type="button" data-value="*">×</button>

        <button class="key" type="button" data-value="4">4</button>
        <button class="key" type="button" data-value="5">5</button>
        <button class="key" type="button" data-value="6">6</button>
        <button class="key key--operator" type="button" data-value="-">−</button>

        <button class="key" type="button" data-value="1">1</button>
        <button class="key" type="button" data-value="2">2</button>
        <button class="key" type="button" data-value="3">3</button>
        <button class="key key--operator" type="button" data-value="+">+</button>

        <button class="key key--wide" type="button" data-value="0">0</button>
        <button class="key" type="button" data-value=".">.</button>
        <button class="key key--equals" type="button" data-action="equals">=</button>
      </section>

      <p class="hint">Keyboard: digits, + − * /, Enter, Backspace, Escape</p>
    </section>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
